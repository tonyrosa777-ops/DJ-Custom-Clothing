services:
  - type: web
    name: djs-art-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: VECTORIZER_API_ID
        sync: false
      - key: VECTORIZER_API_TOKEN
        sync: false
      - key: MAX_FILE_SIZE_MB
        value: 20
      - key: OUTPUT_DPI
        value: 300
      - key: TEMP_DIR
        value: /tmp/djs-art-engine
