services:
  - type: web
    name: djs-art-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # --- Vectorizer.ai (paid API, required) ---
      - key: VECTORIZER_API_ID
        sync: false
      - key: VECTORIZER_API_TOKEN
        sync: false
      - key: VECTORIZER_MODE
        value: production

      # --- Anthropic Claude vision QC (required for bulletproofing) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: QC_MODEL
        value: claude-haiku-4-5

      # --- Replicate Real-ESRGAN upscaling (required for bulletproofing) ---
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: UPSCALE_ENABLED
        value: "true"

      # --- Basic-auth gate (required — this URL is public) ---
      - key: DJ_BASIC_USER
        sync: false
      - key: DJ_BASIC_PASS
        sync: false

      # --- Pipeline tuning ---
      - key: MAX_FILE_SIZE_MB
        value: "20"
      - key: OUTPUT_DPI
        value: "300"
      - key: TEMP_DIR
        value: /tmp/djs-art-engine
