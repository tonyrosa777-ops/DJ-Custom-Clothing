<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DJ's Art Engine</title>
  <style>
    :root {
      --bg: #0a0c10;
      --panel: #171a21;
      --panel-border: #242832;
      --text: #e8eaee;
      --text-dim: #8b92a0;
      --accent: #ff7a1a;
      --accent-hover: #ff9147;
      --accent-disabled: #4a3c2e;
      --danger: #ff4b4b;
      --danger-bg: #2a1414;
      --warning: #f7c948;
      --warning-bg: #2a2314;
      --success: #2ecc71;
      --gold: #d4af37;
      --gold-soft: rgba(212, 175, 55, 0.5);
      --radius: 10px;
    }
    * { box-sizing: border-box; }
    html, body { background-color: #0a0c10; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-x: hidden;
      /* The photo sits beneath everything; ::before adds a light darkening
         overlay only behind the header so the bright sky doesn't fight
         the title. The rest of the photo breathes. */
      background:
        url('/static/background-photo.jpg') center/cover no-repeat fixed,
        #0a0c10;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        /* Side-fade: darkens the bright gold blurred wings, keeps the centered photo unaffected.
           0-15% and 85-100%: heavy darken (the pure blur zone).
           15-32% / 68-85%: gradual fade (the feathered transition).
           32-68%: untouched (the sharp original photo). */
        linear-gradient(90deg,
          rgba(0, 0, 0, 0.88) 0%,
          rgba(0, 0, 0, 0.55) 15%,
          rgba(0, 0, 0, 0.10) 32%,
          rgba(0, 0, 0, 0.00) 50%,
          rgba(0, 0, 0, 0.10) 68%,
          rgba(0, 0, 0, 0.55) 85%,
          rgba(0, 0, 0, 0.88) 100%
        ),
        /* Subtle bottom darken so footer text reads cleanly. */
        linear-gradient(180deg, transparent 70%, rgba(0, 0, 0, 0.35) 100%);
    }
    /* Sit the UI above the overlay. */
    main { position: relative; z-index: 1; }
    header h1, header .subtitle { text-shadow: 0 2px 14px rgba(0, 0, 0, 0.6); }
    main {
      width: 100%;
      max-width: 720px;
    }
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 6px;
      letter-spacing: -0.5px;
      color: #fff5d9;
      text-shadow: 0 2px 18px rgba(0, 0, 0, 0.85), 0 0 30px rgba(0, 0, 0, 0.5);
    }
    header .subtitle {
      color: #e8eaee;
      font-size: 14px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.85);
    }

    .panel {
      background: rgba(18, 20, 27, 0.92);
      backdrop-filter: blur(14px) saturate(125%);
      -webkit-backdrop-filter: blur(14px) saturate(125%);
      border: 1px solid rgba(212, 175, 55, 0.18);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.6),
        0 0 0 1px rgba(212, 175, 55, 0.05),
        0 1px 0 rgba(255, 255, 255, 0.05) inset;
    }

    .dropzone {
      border: 2px dashed var(--panel-border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .dropzone:hover,
    .dropzone.drag-active {
      border-color: var(--accent);
      background: rgba(255, 122, 26, 0.05);
    }
    .dropzone p { margin: 6px 0; color: #b8becc; font-size: 14px; }
    .dropzone p.primary { color: var(--text); font-size: 16px; margin-bottom: 10px; font-weight: 500; }
    .dropzone input { display: none; }

    .file-preview {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
      border-radius: 8px;
      border: 1px solid var(--panel-border);
    }
    .file-preview img {
      width: 56px; height: 56px;
      object-fit: cover;
      border-radius: 6px;
      background: #000;
    }
    .file-preview .meta { flex: 1; min-width: 0; }
    .file-preview .name {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-preview .size { color: var(--text-dim); font-size: 12px; }
    .file-preview .clear {
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 20px; padding: 0 8px;
    }
    .file-preview .clear:hover { color: var(--danger); }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 16px;
    }
    label { font-size: 13px; color: var(--text-dim); }
    input[type="text"] {
      background: #0f1218;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      padding: 10px 12px;
      font-family: inherit;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }

    button.primary {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.15s;
    }
    button.primary:hover:not(:disabled) { background: var(--accent-hover); }
    button.primary:disabled {
      background: var(--accent-disabled);
      color: #8b7a5a;
      cursor: not-allowed;
    }

    .progress-panel { display: none; }
    .progress-panel.active { display: block; }
    .progress-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .spinner {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 3px solid rgba(255, 122, 26, 0.25);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-text {
      font-size: 14px;
      color: var(--text);
      flex: 1;
    }
    .progress-text .label { font-weight: 500; }
    .progress-text .elapsed { color: var(--text-dim); font-size: 12px; margin-top: 2px; }

    .result-panel { display: none; }
    .result-panel.active { display: block; }
    .color-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 12px;
      margin: 16px 0;
    }
    .color-chip {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 12px 8px;
      text-align: center;
    }
    .color-chip .swatch {
      width: 100%;
      padding-top: 70%;
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .color-chip .name {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .color-chip .hex {
      font-size: 11px;
      color: var(--text-dim);
      font-family: "SF Mono", Monaco, Consolas, monospace;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(255, 122, 26, 0.15);
      color: var(--accent);
    }

    .banner {
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.4;
      display: none;
    }
    .banner.active { display: block; }
    .banner.warning { background: var(--warning-bg); border: 1px solid var(--warning); color: var(--warning); }
    .banner.info { background: rgba(58, 162, 255, 0.1); border: 1px solid #3aa2ff; color: #3aa2ff; }
    .banner.error { background: var(--danger-bg); border: 1px solid var(--danger); color: var(--danger); }
    .banner a { color: inherit; font-weight: 600; }

    .rejection-panel { display: none; border-left: 4px solid var(--danger); }
    .rejection-panel.active { display: block; }
    .rejection-header {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 600; color: var(--danger);
      margin-bottom: 16px;
    }
    .rejection-header .icon { font-size: 18px; }
    .customer-ask-label {
      display: block;
      font-size: 13px; color: var(--text-dim); font-weight: 500;
      margin-bottom: 6px;
    }
    #customerAskText {
      width: 100%;
      min-height: 96px;
      background: #0f1218;
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      padding: 12px;
      font-family: inherit;
      resize: vertical;
    }
    #customerAskText:focus { outline: none; border-color: var(--accent); }
    .rejection-actions {
      display: flex; gap: 8px; margin-top: 12px;
    }
    button.secondary {
      flex: 0 0 auto;
      padding: 12px 16px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    button.secondary:hover { border-color: var(--accent); background: rgba(255,122,26,0.05); }
    .rejection-actions .primary { flex: 1; margin-top: 0; }
    .rejection-fallback {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-dim);
    }
    .rejection-fallback a { color: var(--text-dim); }
    .rejection-fallback a:hover { color: var(--accent); }
    .copy-confirm { color: var(--success); font-weight: 600; margin-left: 8px; font-size: 13px; }

    footer {
      text-align: center;
      font-size: 12px;
      color: #d4af37;
      margin-top: 24px;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.85);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>DJ's Art Engine</h1>
      <div class="subtitle">Upload a logo → get print-ready transparency films</div>
    </header>

    <div id="errorBanner" class="banner error"></div>
    <div id="warningBanner" class="banner warning"></div>
    <div id="infoBanner" class="banner info"></div>

    <section id="uploadPanel" class="panel">
      <div id="dropzone" class="dropzone" tabindex="0">
        <p class="primary">Drop a logo here</p>
        <p>JPEG, PNG, HEIC, WebP, BMP, or PDF &middot; or click to browse</p>
        <input id="fileInput" type="file" accept="image/jpeg,image/png,image/heic,image/heif,image/webp,image/bmp,application/pdf,.jpg,.jpeg,.png,.heic,.heif,.webp,.bmp,.pdf" />
      </div>
      <div id="filePreview" class="file-preview" style="display:none;">
        <img id="previewImg" alt="preview" />
        <div class="meta">
          <div id="previewName" class="name"></div>
          <div id="previewSize" class="size"></div>
        </div>
        <button id="clearBtn" class="clear" aria-label="Remove">&times;</button>
      </div>

      <div class="field">
        <label for="jobName">Job name (optional)</label>
        <input type="text" id="jobName" placeholder="e.g. Prime Butcher — Denny Mike's" />
      </div>

      <button id="processBtn" class="primary" disabled>Process</button>
    </section>

    <section id="progressPanel" class="panel progress-panel">
      <div class="progress-row">
        <div class="spinner" aria-hidden="true"></div>
        <div class="progress-text">
          <div class="label" id="progressLabel">Processing…</div>
          <div class="elapsed" id="progressElapsed">0s elapsed</div>
        </div>
      </div>
    </section>

    <section id="resultPanel" class="panel result-panel">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
        <div style="font-size:15px; font-weight:600;">Separation complete</div>
        <span id="colorBadge" class="badge">0 colors</span>
      </div>
      <div id="colorGrid" class="color-grid"></div>
      <button id="downloadBtn" class="primary">Download ZIP</button>
    </section>

    <section id="rejectionPanel" class="panel rejection-panel">
      <div class="rejection-header">
        <span class="icon">!</span>
        <span id="rejectionMessage"></span>
      </div>
      <label class="customer-ask-label" for="customerAskText">Copy and send this to the customer:</label>
      <textarea id="customerAskText" readonly></textarea>
      <div class="rejection-actions">
        <button id="copyCustomerAsk" class="primary">Copy to clipboard<span id="copyConfirm" class="copy-confirm" style="display:none;">Copied</span></button>
        <button id="tryAnotherBtn" class="secondary">Try a different file</button>
      </div>
      <div class="rejection-fallback">
        Stuck? <a href="https://www.photopea.com/" target="_blank" rel="noopener">Edit manually in Photopea →</a>
      </div>
    </section>

    <footer>Built by Optimus Business Solutions</footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const dropzone = $("dropzone");
    const fileInput = $("fileInput");
    const filePreview = $("filePreview");
    const previewImg = $("previewImg");
    const previewName = $("previewName");
    const previewSize = $("previewSize");
    const clearBtn = $("clearBtn");
    const jobName = $("jobName");
    const processBtn = $("processBtn");
    const progressPanel = $("progressPanel");
    const resultPanel = $("resultPanel");
    const colorGrid = $("colorGrid");
    const colorBadge = $("colorBadge");
    const downloadBtn = $("downloadBtn");
    const errorBanner = $("errorBanner");
    const warningBanner = $("warningBanner");
    const infoBanner = $("infoBanner");
    const uploadPanel = $("uploadPanel");
    const rejectionPanel = $("rejectionPanel");
    const rejectionMessage = $("rejectionMessage");
    const customerAskText = $("customerAskText");
    const copyCustomerAsk = $("copyCustomerAsk");
    const copyConfirm = $("copyConfirm");
    const tryAnotherBtn = $("tryAnotherBtn");

    const MAX_SIZE_MB = 20;
    const ACCEPTED_TYPES = [
      "image/jpeg", "image/jpg", "image/pjpeg",
      "image/png",
      "image/heic", "image/heif",
      "image/webp",
      "image/bmp", "image/x-ms-bmp",
      "application/pdf"
    ];
    const ACCEPTED_EXTENSIONS = /\.(jpe?g|png|heic|heif|webp|bmp|pdf)$/i;

    let selectedFile = null;
    let downloadBlob = null;
    let downloadName = "separations.zip";
    let previewObjectUrl = null;

    function setFile(file) {
      if (!file) return;
      if (!ACCEPTED_TYPES.includes(file.type) && !ACCEPTED_EXTENSIONS.test(file.name)) {
        showError("Please upload a JPEG, PNG, HEIC, WebP, BMP, or PDF");
        return;
      }
      if (file.size > MAX_SIZE_MB * 1024 * 1024) {
        showError(`File must be under ${MAX_SIZE_MB}MB`);
        return;
      }
      clearBanners();
      selectedFile = file;
      if (previewObjectUrl) URL.revokeObjectURL(previewObjectUrl);
      const browserRenderable = /^image\/(jpeg|jpg|png|webp|bmp|gif)$/i.test(file.type) ||
                                /\.(jpe?g|png|webp|bmp|gif)$/i.test(file.name);
      if (browserRenderable) {
        previewObjectUrl = URL.createObjectURL(file);
        previewImg.src = previewObjectUrl;
        previewImg.style.display = "";
      } else {
        previewImg.removeAttribute("src");
        previewImg.style.display = "none";
        previewObjectUrl = null;
      }
      previewName.textContent = file.name;
      previewSize.textContent = formatBytes(file.size);
      filePreview.style.display = "flex";
      processBtn.disabled = false;
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = "";
      if (previewObjectUrl) { URL.revokeObjectURL(previewObjectUrl); previewObjectUrl = null; }
      filePreview.style.display = "none";
      processBtn.disabled = true;
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + " B";
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
      return (bytes / 1024 / 1024).toFixed(2) + " MB";
    }

    function clearBanners() {
      errorBanner.classList.remove("active");
      warningBanner.classList.remove("active");
      infoBanner.classList.remove("active");
      rejectionPanel.classList.remove("active");
      copyConfirm.style.display = "none";
    }
    function showError(message, photopeaUrl) {
      errorBanner.innerHTML = escapeHtml(message) +
        (photopeaUrl ? ` <a href="${escapeHtml(photopeaUrl)}" target="_blank" rel="noopener">Open in Photopea →</a>` : "");
      errorBanner.classList.add("active");
    }
    function showWarning(message) {
      warningBanner.textContent = message;
      warningBanner.classList.add("active");
    }
    function showInfo(message) {
      infoBanner.textContent = message;
      infoBanner.classList.add("active");
    }
    function showRejection(djMessage, customerAsk) {
      // textContent is intentional: defends against any HTML in server-generated
      // messages, and the textarea naturally treats its value as plain text.
      rejectionMessage.textContent = djMessage || "This image cannot be processed.";
      customerAskText.value = customerAsk || "";
      rejectionPanel.classList.add("active");
      uploadPanel.style.display = "none";
    }
    function resetToUpload() {
      clearBanners();
      resultPanel.classList.remove("active");
      uploadPanel.style.display = "";
      clearFile();
    }

    let progressStartTime = 0;
    let progressTimer = null;

    function startProgress(label) {
      $("progressLabel").textContent = label || "Processing…";
      progressStartTime = Date.now();
      $("progressElapsed").textContent = "0s elapsed";
      progressPanel.classList.add("active");
      if (progressTimer) clearInterval(progressTimer);
      progressTimer = setInterval(() => {
        const seconds = Math.floor((Date.now() - progressStartTime) / 1000);
        $("progressElapsed").textContent = `${seconds}s elapsed`;
      }, 250);
    }

    function stopProgress() {
      if (progressTimer) { clearInterval(progressTimer); progressTimer = null; }
      progressPanel.classList.remove("active");
    }

    function showWarnings(headers) {
      const messages = [];
      if (headers.get("X-Warning-Only-One-Color") === "1") {
        messages.push("Only 1 color found — verify this is correct before printing.");
      }
      if (headers.get("X-Warning-Complex-Design") === "1") {
        messages.push("Complex design — more than 10 colors detected. Review before printing.");
      }
      if (headers.get("X-Warning-Gradients") === "1") {
        messages.push("This logo contains gradients which were skipped — review output carefully.");
      }
      if (headers.get("X-Warning-MultiPage") === "1") {
        messages.push("Multi-page PDF detected — only the first page was processed.");
      }
      if (headers.get("X-Warning-StrokeOnly") === "1") {
        messages.push("Logo only had outlines (no fills) — stroke colors were used as the separation list.");
      }
      const lowRes = headers.get("X-Warning-LowResolution");
      if (lowRes) {
        messages.push(`Source image is ${lowRes}px. Output detail will be limited by source resolution. For best results, ask the customer for a file at least 2000×2000 pixels.`);
      }
      if (headers.get("X-Warning-UpscaleSkipped") === "1") {
        messages.push("AI upscale failed; using original source. Output detail will be limited.");
      }
      if (headers.get("X-Warning-PhotoOfObject") === "1") {
        messages.push("Detected a photo of an object — the logo was auto-cropped. Verify the color preview before clicking download.");
      }
      if (headers.get("X-Warning-IllegibleText") === "1") {
        messages.push("Small text in this logo may not burn legibly at print size.");
      }
      if (messages.length) {
        warningBanner.innerHTML = messages.map(escapeHtml).join("<br>");
        warningBanner.classList.add("active");
      }
      const upscaled = headers.get("X-Stage-Upscaled");
      if (upscaled) {
        showInfo(`Low-resolution source — automatically upscaled with AI to ${upscaled}px before vectorizing.`);
      }
    }

    async function process() {
      if (!selectedFile) return;
      clearBanners();
      processBtn.disabled = true;
      resultPanel.classList.remove("active");
      startProgress("Processing your logo…");

      const form = new FormData();
      form.append("file", selectedFile);
      if (jobName.value.trim()) form.append("job_name", jobName.value.trim());

      try {
        const response = await fetch("/process", { method: "POST", body: form });

        if (!response.ok) {
          let errorJson = null;
          try { errorJson = await response.json(); } catch (e) {}
          // 422 with customer_ask = QC rejection. Show the actionable panel
          // (customer-ask textarea + copy button) instead of a flat banner.
          if (response.status === 422 && errorJson && errorJson.customer_ask) {
            showRejection(errorJson.dj_message || errorJson.error, errorJson.customer_ask);
            stopProgress();
            processBtn.disabled = false;
            return;
          }
          const msg = (errorJson && (errorJson.detail || errorJson.error)) ||
                      `Request failed (${response.status})`;
          const photopea = errorJson && errorJson.photopea_url;
          showError(msg, photopea);
          stopProgress();
          processBtn.disabled = false;
          return;
        }

        const headers = response.headers;
        const colorCount = parseInt(headers.get("X-Color-Count") || "0", 10);
        const colorNames = (headers.get("X-Color-Names") || "").split(",").filter(Boolean);
        const colorHexes = (headers.get("X-Color-Hexes") || "").split(",").filter(Boolean);

        downloadBlob = await response.blob();
        const contentDisp = headers.get("Content-Disposition") || "";
        const match = contentDisp.match(/filename="?([^";]+)"?/i);
        if (match) downloadName = match[1];

        renderResults(colorCount, colorNames, colorHexes);
        showWarnings(headers);

        stopProgress();
        resultPanel.classList.add("active");
      } catch (err) {
        console.error(err);
        showError("Network error — check your connection and try again.");
        stopProgress();
      } finally {
        processBtn.disabled = false;
      }
    }

    function renderResults(count, names, hexes) {
      colorBadge.textContent = `${count} color${count === 1 ? "" : "s"} detected`;
      colorGrid.innerHTML = "";
      for (let i = 0; i < count; i++) {
        const name = names[i] || `Color ${i + 1}`;
        const hex = hexes[i] || "#888888";
        const chip = document.createElement("div");
        chip.className = "color-chip";
        chip.innerHTML = `
          <div class="swatch" style="background:${hex}"></div>
          <div class="name">${escapeHtml(name)}</div>
          <div class="hex">${escapeHtml(hex)}</div>
        `;
        colorGrid.appendChild(chip);
      }
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (c) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      })[c]);
    }

    function triggerDownload() {
      if (!downloadBlob) return;
      const url = URL.createObjectURL(downloadBlob);
      const a = document.createElement("a");
      a.href = url;
      a.download = downloadName;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1500);
    }

    // --- Event wiring ---------------------------------------------------
    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fileInput.click(); }
    });
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("drag-active"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("drag-active"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("drag-active");
      if (e.dataTransfer.files && e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", (e) => {
      if (e.target.files && e.target.files[0]) setFile(e.target.files[0]);
    });
    clearBtn.addEventListener("click", (e) => { e.stopPropagation(); clearFile(); });
    processBtn.addEventListener("click", process);
    downloadBtn.addEventListener("click", triggerDownload);
    tryAnotherBtn.addEventListener("click", resetToUpload);
    copyCustomerAsk.addEventListener("click", async () => {
      const text = customerAskText.value;
      if (!text) return;
      try {
        await navigator.clipboard.writeText(text);
      } catch (e) {
        // Fallback for non-secure contexts: select + execCommand
        customerAskText.focus();
        customerAskText.select();
        try { document.execCommand("copy"); } catch (_) {}
      }
      copyConfirm.style.display = "inline";
      setTimeout(() => { copyConfirm.style.display = "none"; }, 2000);
    });
  </script>
</body>
</html>
